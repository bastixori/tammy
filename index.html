<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Tami ♥</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: url('background.jpg') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }



        #root {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .container {
            text-align: center;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.75);
            padding: 40px 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.15);
        }

        .tami-text {
            font-family: 'Pacifico', cursive;
            font-size: 5rem;
            color: #ff4d6d;
            text-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            margin-bottom: 20px;
            animation: floatText 3s ease-in-out infinite;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .tami-text:hover {
            transform: scale(1.1) rotate(-2deg);
        }

        .main-heart-container {
            position: relative;
            cursor: pointer;
            pointer-events: auto;
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .main-heart-container:hover {
            transform: scale(1.05);
        }

        .main-heart {
            font-size: 8rem;
            color: #ff0e46;
            filter: drop-shadow(0 10px 20px rgba(255, 14, 70, 0.4));
            animation: pulse 1.2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            14% { transform: scale(1.12); }
            28% { transform: scale(1); }
            42% { transform: scale(1.12); }
            70% { transform: scale(1); }
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Sparking/Floating Hearts */
        .sparkle-heart {
            position: absolute;
            pointer-events: none;
            font-size: var(--size);
            color: var(--color);
            opacity: 1;
            transform: translate(-50%, -50%) scale(0.5);
            animation: floatUp var(--duration) ease-out forwards;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
            z-index: 5;
        }

        @keyframes floatUp {
            0% {
                transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(
                    calc(-50% + var(--tx)), 
                    calc(-50% + var(--ty))
                ) scale(var(--scale)) rotate(var(--rot));
                opacity: 0;
            }
        }

        .hint {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #c9184a;
            font-weight: 600;
            opacity: 0.8;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [hearts, setHearts] = useState([]);

            const colors = [
                '#ff4d6d', '#ff758f', '#ff85a1', '#f72585', 
                '#ffb3c6', '#ffccd5', '#e9ff70', '#e0aaff',
                '#ff99c8', '#fcf6bd', '#d6e2e9'
            ];

            const spawnHearts = (x, y) => {
                const count = 12; // number of particles per click
                const newHearts = [];
                for (let i = 0; i < count; i++) {
                    const id = Math.random().toString(36).substr(2, 9);
                    const size = Math.random() * 25 + 15; // 15px to 40px
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const duration = Math.random() * 1.5 + 1.0; // 1.0s to 2.5s
                    const symbol = Math.random() > 0.45 ? '♥' : '🌻';
                    
                    // Random destination vector (spread out)
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 150 + 80;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance - 100; // float upwards too
                    const rot = (Math.random() - 0.5) * 720; // rotation
                    const scale = Math.random() * 0.8 + 0.8; // final scale
                    
                    newHearts.push({
                        id,
                        x,
                        y,
                        size: `${size}px`,
                        color,
                        duration: `${duration}s`,
                        tx: `${tx}px`,
                        ty: `${ty}px`,
                        rot: `${rot}deg`,
                        scale,
                        symbol
                    });
                }
                setHearts(prev => [...prev, ...newHearts]);
            };

            const handleScreenClick = (e) => {
                let clientX, clientY;
                if (e.type === 'touchstart') {
                    // Touch events (mobile)
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    // Click events (desktop)
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                if (clientX !== undefined && clientY !== undefined) {
                    spawnHearts(clientX, clientY);
                }
            };

            // Cleanup hearts after animation finishes
            useEffect(() => {
                if (hearts.length > 100) {
                    const timer = setTimeout(() => {
                        setHearts(prev => prev.slice(prev.length - 80));
                    }, 3000);
                    return () => clearTimeout(timer);
                }
            }, [hearts]);

            return (
                <div 
                    style={{ width: '100%', height: '100%', position: 'relative' }} 
                    onClick={handleScreenClick}
                    onTouchStart={handleScreenClick}
                >
                    {/* Floating Clicked Hearts & Sunflowers */}
                    {hearts.map(heart => (
                        <div
                            key={heart.id}
                            className="sparkle-heart"
                            style={{
                                left: heart.x,
                                top: heart.y,
                                '--size': heart.size,
                                '--color': heart.symbol === '🌻' ? 'inherit' : heart.color,
                                '--duration': heart.duration,
                                '--tx': heart.tx,
                                '--ty': heart.ty,
                                '--rot': heart.rot,
                                '--scale': heart.scale
                            }}
                        >
                            {heart.symbol}
                        </div>
                    ))}

                    <div className="container">
                        <div className="tami-text">Tami</div>
                        
                        <div className="main-heart-container" 
                            onTouchStart={(e) => {
                                e.stopPropagation();
                                const touch = e.touches[0];
                                spawnHearts(touch.clientX, touch.clientY);
                            }}
                            onClick={(e) => {
                                e.stopPropagation();
                                spawnHearts(e.clientX, e.clientY);
                            }}
                        >
                            <div className="main-heart">💖</div>
                        </div>

                        <div className="hint">¡Haz click en la pantalla para llenar de corazones!</div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
